<!doctype html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Monitoring Config</title><link rel="stylesheet" href="/static/style.css"></head><body>
<header><h1>轻量舆情监测工具（Vercel版）</h1><nav><a href="/monitoring.html">Monitoring Config</a><a href="/results.html">Results List</a><a href="/alerts.html">Alerts List</a></nav></header>
<main>
<section class="card"><h2>Monitoring Config</h2><form id="createForm">
<label>任务名称 <input name="name" required></label>
<label>关键词（逗号分隔） <input name="keywords" required></label>
<label>排除关键词（逗号分隔） <input name="exclude_keywords"></label>
<label>语言（逗号分隔，如 zh,en） <input name="languages" value="zh,en"></label>
<label>搜索源RSS地址（逗号分隔） <input name="sources" value="https://hnrss.org/frontpage"></label>
<label>搜索频率（分钟） <input name="frequency_minutes" type="number" min="1" value="30"></label>
<label>告警阈值（0-1） <input name="alert_threshold" type="number" step="0.1" value="0.6"></label>
<button type="submit">创建任务</button></form></section>
<section class="card"><h3>已创建任务</h3><button onclick="loadTasks()">刷新任务列表</button><ul id="taskList"></ul></section>
</main>
<script src="/static/app.js"></script>
<script>
const splitInput=v=>v.split(',').map(x=>x.trim()).filter(Boolean);
async function loadTasks(){const tasks=await api('/api/tasks');const ul=document.getElementById('taskList');ul.innerHTML='';tasks.forEach(t=>{const li=document.createElement('li');li.innerHTML=`#${t.id} ${t.name} | 关键词: ${t.keywords.join('/')} <button onclick="manualRun(${t.id})">手动运行</button>`;ul.appendChild(li);});}
async function manualRun(id){const d=await api(`/api/tasks/${id}/run`,'POST',{});alert('完成，本次新增 '+d.inserted+' 条');}
document.getElementById('createForm').addEventListener('submit', async (e)=>{e.preventDefault();const f=new FormData(e.target);const payload={name:f.get('name'),keywords:splitInput(f.get('keywords')),exclude_keywords:splitInput(f.get('exclude_keywords')),languages:splitInput(f.get('languages')),sources:splitInput(f.get('sources')),frequency_minutes:Number(f.get('frequency_minutes')),alert_threshold:Number(f.get('alert_threshold'))};const d=await api('/api/tasks','POST',payload);if(d.task_id){alert('创建成功: '+d.task_id);loadTasks();}else{alert(JSON.stringify(d));}});
loadTasks();
</script></body></html>
